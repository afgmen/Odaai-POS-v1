name: Deploy to Netlify

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build Flutter Web & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.9'
        channel: 'stable'
        cache: true

    - name: Cache pub dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          .dart_tool
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Get dependencies
      run: flutter pub get

    - name: Run build_runner
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Build Flutter Web
      run: flutter build web --release --base-href /

    - name: Download sqlite3.wasm from GitHub Releases
      run: |
        # Read sqlite3 version from pubspec.lock
        SQLITE3_VERSION=$(grep -A5 '  sqlite3:' pubspec.lock | grep 'version:' | head -1 | tr -d ' "' | cut -d: -f2)
        echo "sqlite3 version: $SQLITE3_VERSION"
        WASM_URL="https://github.com/simolus3/sqlite3.dart/releases/download/sqlite3-${SQLITE3_VERSION}/sqlite3.wasm"
        echo "Downloading from: $WASM_URL"
        curl -L "$WASM_URL" -o web/sqlite3.wasm
        echo "Downloaded sqlite3.wasm: $(ls -lh web/sqlite3.wasm)"

    - name: Copy WASM assets to build output
      run: |
        cp web/sqlite3.wasm build/web/sqlite3.wasm
        cp web/drift_worker.dart.js build/web/drift_worker.dart.js
        echo "WASM assets copied:"
        ls -la build/web/*.wasm build/web/drift_worker.dart.js

    - name: Deploy to Netlify
      uses: netlify/actions/cli@master
      with:
        args: deploy --prod --dir=build/web
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
